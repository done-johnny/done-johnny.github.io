<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 3 - I'm a Dev Now</title>
  <style>
    body {
      background: #0f172a;
      color: #fbbf24;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
    h1 { 
      color: #fbbf24; 
      font-size: 28px;
      margin-bottom: 10px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    input, button {
      background: #334155;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 10px;
    }
    button {
      background: #22c55e;
      cursor: pointer;
    }
    button.reset {
      background: #ef4444;
      margin-left: 10px;
    }
    hr {
      border-color: #334155;
      margin: 20px 0;
      border-style: solid;
    }
    #dayCount, #totalHours {
      font-size: 36px;
      color: #22c55e;
    }
    ul {
      text-align: left;
      list-style: none;
      padding: 0;
    }
    li {
      background: #334155;
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Day 3: Track My Hours</h1>
  <div class="card">
    <p><strong>Name:</strong> Done Johnny</p>
    <p><strong>Goal:</strong> Get remote job by coding by Dec 2027</p>
    
    <hr>
    
    <h2>Day <span id="dayCount">3</span></h2>
    <p><strong>Total Hours:</strong> <span id="totalHours">0</span>h</p>
    
    <input type="number" id="hoursInput" placeholder="Hours coded today" min="0" step="0.5">
    <button onclick="logHours()">Log Hours</button>
    
    <hr>
    
    <h3>History</h3>
    <ul id="historyList"></ul>
    
    <button class="reset" onclick="resetAll()">Reset All</button>
  </div>

  <script>
    let day = parseInt(localStorage.getItem('codingDay')) || 3;
    let hoursLog = JSON.parse(localStorage.getItem('hoursLog')) || [];
    
    function updateUI() {
      document.getElementById('dayCount').textContent = day;
      let total = hoursLog.reduce((sum, entry) => sum + entry.hours, 0);
      document.getElementById('totalHours').textContent = total;
      
      let list = document.getElementById('historyList');
      list.innerHTML = '';
      hoursLog.slice().reverse().forEach(entry => {
        list.innerHTML += `<li>Day ${entry.day}: ${entry.hours}h</li>`;
      });
    }
    
    function logHours() {
      let hours = parseFloat(document.getElementById('hoursInput').value);
      if(!hours || hours <= 0) {
        alert('Enter valid hours');
        return;
      }
      
      hoursLog.push({day: day, hours: hours});
      localStorage.setItem('hoursLog', JSON.stringify(hoursLog));
      document.getElementById('hoursInput').value = '';
      
      day++;
      localStorage.setItem('codingDay', day);
      updateUI();
      alert(`Logged ${hours}h ✅ Day ${day-1} complete!`);
    }
    
    function resetAll() {
      if(confirm('Reset everything?')) {
        localStorage.clear();
        day = 3;
        hoursLog = [];
        updateUI();
      }
    }
    
    updateUI();
  </script>
</body>
</html>Day 3 update add- hours tracker
