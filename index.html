
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 2 - I'm a Dev Now</title>
  <style>
    body {
      background: #0f172a;
      color: #fbbf24;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
    h1 { 
      color: #fbbf24; 
      font-size: 28px;
      margin-bottom: 10px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }
    button.reset {
      background: #ef4444;
      margin-left: 10px;
    }
    hr {
      border-color: #334155;
      margin: 20px 0;
      border-style: solid;
    }
    #dayCount {
      font-size: 36px;
      color: #22c55e;
    }
  </style>
</head>
<body>
  <h1>Day 2: My Coding Journey</h1>
  <div class="card">
    <p><strong>Name:</strong> Done Johnny</p>
    <p><strong>Phone:</strong> 08107811087</p>
    <p><strong>Goal:</strong> Get remote job by coding by Dec 2027</p>
    <p><strong>Started:</strong> May 9, 2026</p>
    
    <hr>
    
    <h2>Day <span id="dayCount">2</span></h2>
    <p id="status">Keep building!</p>
    
    <button onclick="completeDay()">Day complete!</button>
    <button class="reset" onclick="resetDay()">Reset</button>
  </div>

  <script>
    let day = localStorage.getItem('codingDay') || 2;
    
    function updateUI() {
      document.getElementById('dayCount').textContent = day;
      document.getElementById('status').textContent = 
        day > 2 ? `Day ${day} in progress. Keep going!` : "Keep building!";
    }
    
    function completeDay() {
      day = parseInt(day) + 1;
      localStorage.setItem('codingDay', day);
      updateUI();
      alert(`Day ${day-1} done ✅ Streak: ${day-1} days`);
    }
    
    function resetDay() {
      if(confirm('Reset your streak?')) {
        day = 2;
        localStorage.setItem('codingDay', 2);
        updateUI();
      }
    }
    
    updateUI();
  </script>
</body>
</html>
