<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 6 - I'm a Dev Now</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card: #1e293b;
      --text: #fbbf24;
      --muted: #94a3b8;
      --input: #334155;
      --green: #22c55e;
      --red: #ef4444;
    }
    
    [data-theme="light"] {
      --bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --input: #e2e8f0;
      --green: #16a34a;
      --red: #dc2626;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px 15px;
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    h1 { 
      color: var(--text); 
      font-size: 26px;
      margin-bottom: 5px;
    }
    .quote {
      font-style: italic;
      color: var(--muted);
      margin: 15px 0;
      font-size: 14px;
    }
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--input);
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 20px;
    }
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      margin-top: 15px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    input, button {
      background: var(--input);
      color: var(--text);
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: var(--green);
      cursor: pointer;
      font-weight: bold;
      color: white;
    }
    button:active {
      transform: scale(0.98);
    }
    button.reset {
      background: var(--red);
      margin-top: 15px;
    }
    hr {
      border-color: var(--input);
      margin: 20px 0;
      border-style: solid;
    }
    #dayCount, #totalHours, #streak {
      font-size: 32px;
      color: var(--green);
    }
    ul {
      text-align: left;
      list-style: none;
      padding: 0;
    }
    li {
      background: var(--input);
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
    }
    .progress-bar {
      background: var(--input);
      height: 24px;
      border-radius: 12px;
      overflow: hidden;
      margin: 15px 0;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--green), #16a34a);
      height: 100%;
      width: 0%;
      transition: width 0.5s ease;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }
    .stat {
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  
  <h1>Day 6: Theme Switcher</h1>
  <p class="quote" id="quote">Loading motivation...</p>
  
  <div class="card">
    <p><strong>Done Johnny</strong> | Goal: Remote job by Dec 2027</p>
    
    <div class="stats">
      <div class="stat">
        <div id="dayCount">6</div>
        <div class="stat-label">Day</div>
      </div>
      <div class="stat">
        <div id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div id="totalHours">0</div>
        <div class="stat-label">Hours</div>
      </div>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p><span id="progressText">0%</span> to 100 hours</p>
    
    <input type="number" id="hoursInput" placeholder="Hours coded today" min="0" step="0.5">
    <button onclick="logHours()">Log Hours</button>
    
    <hr>
    
    <h3>History</h3>
    <ul id="historyList"></ul>
    
    <button class="reset" onclick="resetAll()">Reset All</button>
  </div>

  <script>
    const quotes = [
      "Consistency beats intensity every time.",
      "You're 1% better than yesterday.",
      "Future you is watching. Don't disappoint them.",
      "Code a little. Every. Single. Day.",
      "Discipline is choosing what you want most over what you want now.",
      "Small steps daily lead to massive results."
    ];
    
    let day = parseInt(localStorage.getItem('codingDay')) || 6;
    let hoursLog = JSON.parse(localStorage.getItem('hoursLog')) || [];
    let theme = localStorage.getItem('theme') || 'dark';
    
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', theme);
      applyTheme();
    }
    
    function showQuote() {
      let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('quote').textContent = '"' + randomQuote + '"';
    }
    
    function updateUI() {
      document.getElementById('dayCount').textContent = day;
      document.getElementById('streak').textContent = hoursLog.length;
      
      let total = hoursLog.reduce((sum, entry) => sum + entry.hours, 0);
      document.getElementById('totalHours').textContent = total;
      
      let percent = Math.min((total / 100) * 100, 100);
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressText').textContent = Math.round(percent) + '%';
      
      let list = document.getElementById('historyList');
      list.innerHTML = '';
      hoursLog.slice().reverse().forEach(entry => {
        list.innerHTML += `<li>Day ${entry.day}: ${entry.hours}h</li>`;
      });
    }
    
    function logHours() {
      let hours = parseFloat(document.getElementById('hoursInput').value);
      if(!hours || hours <= 0) {
        alert('Enter valid hours');
        return;
      }
      
      hoursLog.push({day: day, hours: hours});
      localStorage.setItem('hoursLog', JSON.stringify(hoursLog));
      document.getElementById('hoursInput').value = '';
      
      day++;
      localStorage.setItem('codingDay', day);
      updateUI();
      showQuote();
      alert(`Logged ${hours}h ✅ Day ${day-1} complete!`);
    }
    
    function resetAll() {
      if(confirm('Reset everything?')) {
        localStorage.clear();
        day = 6;
        hoursLog = [];
        theme = 'dark';
        updateUI();
        showQuote();
        applyTheme();
      }
    }
    
    updateUI();
    showQuote();
    applyTheme();
  </script>
</body>
</html>
